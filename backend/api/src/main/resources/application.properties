spring.application.name=marketplace-project
spring.config.import=optional:file:../../.env[.properties]

spring.datasource.url=${BD_URL}
spring.datasource.username=${BD_ADMIN}
spring.datasource.password=${BD_SENHA}

spring.jpa.hibernate.ddl-auto=validate
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jpa.open-in-view=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cloudinary.media-root=${CLOUDINARY_MEDIA_ROOT:nekobox/games}
app.cloudinary.screenshot-count=${CLOUDINARY_SCREENSHOT_COUNT:10}
FIREBASE_API_KEY=${FIREBASE_API_KEY:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
